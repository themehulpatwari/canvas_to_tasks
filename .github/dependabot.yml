version: 2
updates:
  # Python dependencies (requirements.txt). Individual PRs (not grouped) so the
  # CI smoke test gives each bump its own pass/fail signal — green means safe.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
